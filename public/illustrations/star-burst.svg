<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <!-- sparkle с pulse rotate -->
  <g style="transform-origin: 80px 80px; transform-box: view-box;">
    <path d="M 80 10
             Q 82 60 130 78
             Q 82 82 80 150
             Q 78 82 30 80
             Q 78 78 80 10 Z"
          stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="oklch(0.88 0.06 25)" fill-opacity="0.65"/>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 80 80; 12 80 80; 0 80 80"
                      dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- secondary smaller sparkle — twinkle -->
  <g style="transform-origin: 130px 52px; transform-box: view-box;">
    <path d="M 130 30 L 132 50 L 152 52 L 132 54 L 130 75 L 128 54 L 108 52 L 128 50 Z"
          stroke="currentColor" stroke-width="1" stroke-linejoin="round" fill="oklch(0.83 0.08 168)" fill-opacity="0.6"/>
    <animateTransform attributeName="transform" type="scale"
                      values="0.6 0.6; 1 1; 0.6 0.6" dur="2.5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <circle cx="40" cy="120" r="3" fill="currentColor" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
