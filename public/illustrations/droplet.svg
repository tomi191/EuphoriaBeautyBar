<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <circle cx="100" cy="135" r="85" fill="oklch(0.83 0.08 168)" opacity="0.4">
    <animate attributeName="r" values="85;92;85" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="45" r="14" fill="oklch(0.88 0.06 25)" opacity="0.55"/>

  <!-- main droplet with breath -->
  <g style="transform-origin: 100px 135px; transform-box: view-box;">
    <path d="M 100 30
             Q 100 60 130 110
             Q 165 170 130 200
             Q 100 220 70 200
             Q 35 170 70 110
             Q 100 60 100 30 Z"
          stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="oklch(0.83 0.08 168)" fill-opacity="0.4"/>
    <animateTransform attributeName="transform" type="scale"
                      values="1 1; 1.04 1.04; 1 1" dur="4s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- splash droplets — fade in/out като че ли пада нова капка -->
  <path d="M 30 80 Q 28 90 35 92 Q 42 88 30 80 Z" fill="currentColor" opacity="0.4">
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 175 130 Q 173 140 180 142 Q 185 137 175 130 Z" fill="currentColor" opacity="0.45">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.5s" begin="1s" repeatCount="indefinite"/>
  </path>
  <circle cx="22" cy="180" r="3" fill="currentColor" opacity="0.5">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="200" r="2" fill="currentColor" opacity="0.5">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
</svg>
