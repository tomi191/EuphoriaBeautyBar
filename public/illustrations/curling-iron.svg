<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" fill="none">
  <ellipse cx="170" cy="80" rx="60" ry="50" fill="oklch(0.88 0.06 25)" opacity="0.45">
    <animate attributeName="rx" values="60;65;60" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="80" cy="240" rx="55" ry="45" fill="oklch(0.83 0.08 168)" opacity="0.45"/>

  <path d="M 110 50
           L 220 50
           Q 235 50 235 65
           L 235 90
           Q 235 105 220 105
           L 110 105 Z"
        stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="oklch(0.99 0.005 75)" fill-opacity="0.55"/>
  <line x1="125" y1="50" x2="125" y2="105" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="50" x2="140" y2="105" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <circle cx="222" cy="77" r="3" fill="currentColor"/>

  <path d="M 145 105
           Q 142 130 155 132
           L 220 132
           Q 232 132 232 122
           L 232 110"
        stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="none"/>

  <path d="M 95 95
           L 110 130
           Q 100 180 80 230
           Q 65 270 60 295
           Q 58 305 65 308
           Q 75 310 80 300
           Q 95 270 110 230
           Q 130 180 140 130 Z"
        stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="oklch(0.99 0.005 75)" fill-opacity="0.55"/>

  <ellipse cx="125" cy="155" rx="8" ry="14" stroke="currentColor" stroke-width="1.5" fill="oklch(0.83 0.08 168)" fill-opacity="0.5">
    <animate attributeName="fill-opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- spirals — анимирано ротиране (новият curl ефект) -->
  <g style="transform-origin: 252px 192px; transform-box: view-box;">
    <path d="M 250 170
             Q 270 175 270 195
             Q 270 215 250 215
             Q 235 215 235 200
             Q 235 188 248 188"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.65"/>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 252 192; 360 252 192" dur="14s" repeatCount="indefinite"/>
  </g>
  <g style="transform-origin: 259px 252px; transform-box: view-box;">
    <path d="M 252 235
             Q 268 240 268 255
             Q 266 270 250 270"
          stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>
    <animateTransform attributeName="transform" type="rotate"
                      values="360 259 252; 0 259 252" dur="11s" repeatCount="indefinite"/>
  </g>
</svg>
