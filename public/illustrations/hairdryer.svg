<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" fill="none">
  <ellipse cx="100" cy="150" rx="95" ry="80" fill="oklch(0.83 0.08 168)" opacity="0.4">
    <animate attributeName="rx" values="95;100;95" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <path d="M 240 60 Q 270 90 250 130 Q 220 150 215 110 Q 220 70 240 60 Z"
        fill="oklch(0.88 0.06 25)" opacity="0.5"/>

  <path d="M 60 100
           L 175 80
           Q 215 75 220 110
           Q 222 145 220 175
           Q 215 215 175 210
           L 60 195
           Q 30 190 30 165
           L 30 130
           Q 30 105 60 100 Z"
        stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="oklch(0.99 0.005 75)" fill-opacity="0.55"/>

  <!-- въртящ се вентилатор -->
  <circle cx="55" cy="148" r="26" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <g style="transform-origin: 55px 148px; transform-box: view-box;">
    <circle cx="55" cy="148" r="14" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.7"/>
    <line x1="55" y1="134" x2="55" y2="162" stroke="currentColor" stroke-width="1.2" opacity="0.6"/>
    <line x1="41" y1="148" x2="69" y2="148" stroke="currentColor" stroke-width="1.2" opacity="0.6"/>
    <animateTransform attributeName="transform" type="rotate"
                      from="0 55 148" to="360 55 148"
                      dur="3s" repeatCount="indefinite"/>
  </g>
  <circle cx="55" cy="148" r="5" fill="currentColor"/>

  <line x1="220" y1="105" x2="220" y2="180" stroke="currentColor" stroke-width="1.5"/>
  <path d="M 222 105 L 245 95 L 245 190 L 222 180" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="oklch(0.83 0.08 168)" fill-opacity="0.35"/>

  <path d="M 110 195
           Q 95 260 130 270
           Q 165 275 175 240
           L 175 210"
        stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="oklch(0.99 0.005 75)" fill-opacity="0.55"/>

  <!-- airflow lines — pulse навън -->
  <g stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.55">
    <path d="M 260 120 L 285 115">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 260 145 L 290 140">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M 260 170 L 285 175">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <circle cx="140" cy="135" r="2" fill="currentColor" opacity="0.6"/>
  <circle cx="155" cy="155" r="1.8" fill="currentColor" opacity="0.5"/>
</svg>
