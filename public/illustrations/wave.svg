<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" fill="none">
  <ellipse cx="180" cy="100" rx="170" ry="60" fill="oklch(0.88 0.06 25)" opacity="0.3"/>

  <!-- wave 1 — slow drift -->
  <g style="transform-origin: 180px 60px; transform-box: view-box;">
    <path d="M 20 40
             Q 80 20 130 60
             Q 180 100 230 70
             Q 280 40 340 80"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; -10 4; 0 0; 10 -4; 0 0" dur="9s" repeatCount="indefinite"/>
  </g>

  <!-- wave 2 -->
  <g style="transform-origin: 180px 110px; transform-box: view-box;">
    <path d="M 20 90
             Q 70 70 120 110
             Q 175 145 230 115
             Q 285 90 340 125"
          stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; 8 -3; 0 0; -8 3; 0 0" dur="11s" repeatCount="indefinite"/>
  </g>

  <!-- wave 3 -->
  <g style="transform-origin: 180px 160px; transform-box: view-box;">
    <path d="M 25 145
             Q 80 130 130 160
             Q 180 185 240 165
             Q 295 145 340 165"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.5"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; -6 2; 0 0; 6 -2; 0 0" dur="13s" repeatCount="indefinite"/>
  </g>

  <ellipse cx="60" cy="130" rx="35" ry="22" fill="oklch(0.83 0.08 168)" opacity="0.45"/>
  <ellipse cx="300" cy="50" rx="28" ry="18" fill="oklch(0.83 0.08 168)" opacity="0.45"/>
</svg>
